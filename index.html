<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Weather Forecast</title>
    <link rel="stylesheet" href="style.css" />
    <script defer src="script.js"></script>
